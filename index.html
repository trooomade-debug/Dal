<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Celebration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ipod">
        <div class="status-bar">
            <div class="battery">&#9789;</div>
            <div class="date">JUL 9</div>
            <div class="time">12:00</div>
        </div>

        <div class="screen">
            <div class="screen-content">
                <div class="view active" id="hey-view">
                    <div class="header">
                        <h2>Hey</h2>
                    </div>
                    <div class="content-area">
                        <div class="message-display">
                            <div class="message-text">Hey you 😊</div>
                        </div>
                        <div class="message-indicators">
                            <div class="indicator active"></div>
                            <div class="indicator"></div>
                            <div class="indicator"></div>
                            <div class="indicator"></div>
                            <div class="indicator"></div>
                        </div>
                    </div>
                </div>

                <div class="view" id="fun-view">
                    <div class="header">
                        <h2>Fun</h2>
                    </div>
                    <div class="content-area">
                        <div class="message-display">
                            <div class="message-text">Tap for a surprise</div>
                        </div>
                        <div class="message-indicators">
                            <div class="indicator"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="progress-bar">
                <div class="progress"></div>
            </div>

            <div class="nav-controls">
                <button class="nav-button prev" aria-label="Previous">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <button class="nav-button play" aria-label="Play">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <polygon points="8,5 8,19 19,12" fill="currentColor"/>
                    </svg>
                </button>
                <button class="nav-button next" aria-label="Next">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
