<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Celebration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ipod">
        <div class="status-bar">
            <div class="battery">&#9789;</div>
            <div class="date">JUL 9</div>
            <div class="time">12:00</div>
        </div>

        <div class="click-wheel">
            <div class="wheel-ring"></div>
            <div class="wheel-center">
                <div class="menu-button">Menu</div>
            </div>
        </div>

        <div class="screen">
            <div class="screen-content">
                <div class="view active" id="hey-view">
                    <div class="header">
                        <h2>Hey</h2>
                    </div>
                    <div class="content-area">
                        <div class="message-display">
                            <div class="message-text">Hey you 😊</div>
                        </div>
                        <div class="message-indicators">
                            <div class="indicator active"></div>
                            <div class="indicator"></div>
                            <div class="indicator"></div>
                            <div class="indicator"></div>
                            <div class="indicator"></div>
                        </div>
                    </div>
                </div>

                <div class="view" id="fun-view">
                    <div class="header">
                        <h2>Fun</h2>
                    </div>
                    <div class="content-area">
                        <div class="message-display">
                            <div class="message-text">Tap for a surprise</div>
                        </div>
                        <div class="message-indicators">
                            <div class="indicator"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="progress-bar">
                <div class="progress"></div>
            </div>

            <div class="nav-controls">
                <button class="nav-button prev">&#9664;</button>
                <button class="nav-button play">&#9658;</button>
                <button class="nav-button next">&#9654;</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
